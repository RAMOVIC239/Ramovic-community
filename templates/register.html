<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMOVIC COMMUNITY - Registration</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>🚀 RAMOVIC PROGRAMMING COMMUNITY</h1>

<h2>Programmer Registration Form</h2>

<p>
Join a community of developers, learners, and innovators.
</p>

<form method="POST" action="/submit">

<input
type="text"
name="name"
placeholder="👤 Full Name"
required>

<br><br>

<input
type="text"
name="phone"
placeholder="📱 WhatsApp Number"
required>

<br><br>

<select name="level" required>

<option value="">💻 Select Programming Level</option>

<option>Beginner</option>

<option>Intermediate</option>

<option>Advanced</option>

</select>

<br><br>

<textarea
name="reason"
rows="6"
placeholder="✍️ Why do you want to join RAMOVIC Programming Community?"
required></textarea>

<br><br>

<button type="submit" class="join-btn">
🚀 Submit Application
</button>

</form>

<br><br>

<a href="/">
<button>
🏠 Back Home
</button>
</a>

</div>

</body>
</html>
