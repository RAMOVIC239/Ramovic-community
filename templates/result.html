<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

{% if user[5] == 'approved' %}

<h2>🎉 Congratulations, Approved!</h2>

<a href="{{ user[6] }}">
    <button>Join WhatsApp Group</button>
</a>

{% elif user[5] == 'rejected' %}

<h2>❌ Sorry, Not Approved</h2>

{% else %}

<h2>⏳ Pending Approval</h2>

{% endif %}

</div>

</body>
</html>
