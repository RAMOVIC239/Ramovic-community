<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Application Status</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

{% if user[5] == 'approved' %}

<h2>🎉 Congratulations!</h2>
<p>Your application has been approved.</p>

<a href="{{ user[6] }}" target="_blank">
    <button>Join WhatsApp Group</button>
</a>

{% elif user[5] == 'rejected' %}

<h2>❌ Sorry</h2>
<p>Your application was not approved.</p>

{% else %}

<h2>⏳ Application Pending</h2>
<p>Please wait for admin review.</p>

{% endif %}

<br><br>

<a href="/">
    <button>Back Home</button>
</a>

</div>

</body>
</html>
